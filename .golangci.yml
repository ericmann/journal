# golangci-lint configuration.
#
# The pinned golangci-lint release (v1.64.8) is built with go1.24 and refuses to
# analyze a module whose go.mod targets a newer Go than its own build. We keep
# go.mod at the real toolchain version (1.26.x) for building/testing, and tell
# the linter to target 1.24 — our code uses no >1.24 language features, so this
# is accurate and keeps CI's prebuilt linter happy.
run:
  go: "1.24"
  timeout: 5m

name: Docs

on:
  push:
    branches: [main]
    paths:
      - "book/**"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "book/**"
      - ".github/workflows/docs.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  MDBOOK_VERSION: "0.4.40"
  MDBOOK_LINKCHECK_VERSION: "0.7.7"

jobs:
  build:
    name: build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          url="https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          curl -sSL "$url" | tar xz
          mv mdbook /usr/local/bin/

      - name: Install mdbook-linkcheck
        run: |
          url="https://github.com/Michael-F-Bryan/mdbook-linkcheck/releases/download/v${MDBOOK_LINKCHECK_VERSION}/mdbook-linkcheck.x86_64-unknown-linux-gnu.zip"
          curl -sSL "$url" -o linkcheck.zip
          unzip -q linkcheck.zip -d /tmp/linkcheck
          mv /tmp/linkcheck/mdbook-linkcheck /usr/local/bin/
          chmod +x /usr/local/bin/mdbook-linkcheck

      - name: Build
        run: mdbook build book/

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/book/

  deploy:
    name: deploy to Pages
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
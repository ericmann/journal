name: Release

on:
  push:
    tags: ["v*"]
  # Also dispatchable on a tag ref — prepare-release.yml triggers this after it
  # creates the tag (a tag pushed by GITHUB_TOKEN does not auto-fire workflows).
  workflow_dispatch: {}

permissions:
  contents: write   # create the GitHub release + upload assets
  id-token: write   # keyless cosign signing via GitHub OIDC

# Run the Node20-based actions on Node 24 ahead of GitHub forcing it
# (2026-06-16) and removing Node 20 (2026-09-16).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for the changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Use the curated CHANGELOG section for this tag as the release notes
      # (falls back to GoReleaser's auto-generated notes if the section is absent).
      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          notes="$(bash scripts/changelog-section.sh "$GITHUB_REF_NAME" || true)"
          if [ -n "$notes" ]; then
            printf '%s\n' "$notes" > release-notes.md
            echo "args=--release-notes=release-notes.md" >> "$GITHUB_OUTPUT"
            echo "Using the CHANGELOG section for $GITHUB_REF_NAME as release notes."
          else
            echo "args=" >> "$GITHUB_OUTPUT"
            echo "::notice::No CHANGELOG section for $GITHUB_REF_NAME — GoReleaser will auto-generate notes."
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean ${{ steps.notes.outputs.args }}
        env:
          # Default token: creates the release + uploads assets on this repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with write access to ericmann/homebrew-tap for the cask push.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
